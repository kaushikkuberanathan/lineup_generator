name: "📋 Story"
description: New backlog story — feature, fix, or improvement for ROADMAP.md
title: "Story [N]: "
labels: ["status:in-progress"]
body:

  - type: markdown
    attributes:
      value: |
        > **Naming:** Set the title to `Story [N]: [short name]` where N is the next sequential story number in ROADMAP.md.
        > After filing, add this issue number to the matching Story block in ROADMAP.md.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P0 — Drop everything"
        - "P1 — Fix this release"
        - "P2 — Next 1-2 releases"
        - "P3 — Backlog"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Feature
        - Bug
        - Chore
        - Governance
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scoring / Game Mode
        - Auth
        - UX / Frontend
        - Backend
        - CI / Ops
        - Share link
        - Roster
        - Supabase / DB
        - Analytics
        - Other
    validations:
      required: true

  - type: input
    id: discovered
    attributes:
      label: Discovered
      description: Date and context (e.g. "2026-05-19, real-game smoke test")
      placeholder: "2026-05-19, [context]"
    validations:
      required: true

  - type: input
    id: target_version
    attributes:
      label: Target version
      placeholder: "v2.6.0"

  - type: textarea
    id: symptom
    attributes:
      label: Symptom
      description: What goes wrong? What does the coach experience?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected and how badly?
      placeholder: "All coaches using share links in production. Share link loads a blank screen instead of the lineup."
    validations:
      required: true

  - type: textarea
    id: root_cause
    attributes:
      label: Root cause
      description: Known / hypothesis / unknown — and what it is
      placeholder: "Unknown — routing logic in App.jsx renderSharedView may not be receiving the ?s= param correctly after the v2.5.x rewrite."

  - type: textarea
    id: proposed_fixes
    attributes:
      label: Proposed fixes
      description: Options with tradeoffs

  - type: textarea
    id: recommendation
    attributes:
      label: Recommendation
      description: Which option and why

  - type: checkboxes
    id: gates
    attributes:
      label: Definition of done
      options:
        - label: Tests written (RED → GREEN)
        - label: Docs updated (Pre-release Docs Checklist walked)
        - label: Overnight soak on develop
        - label: Phone smoke test on Vercel preview
        - label: Share link behavior unaffected (if touching routing)
        - label: Auth principle unaffected (if touching auth)
