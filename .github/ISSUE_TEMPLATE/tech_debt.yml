name: Tech Debt
description: Test gap, doc gap, or process gap — maps to DOC_TEST_DEBT.md ledger format
title: "[Debt]: "
labels: ["type: tech-debt", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Check DOC_TEST_DEBT.md before submitting — this item may already be tracked.

  - type: dropdown
    id: debt_type
    attributes:
      label: Debt type
      options:
        - "Test gap — missing or insufficient test coverage"
        - "Doc gap — undocumented behavior or architecture"
        - "Process gap — workflow or discipline issue"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P0 — blocks next release"
        - "P1 — high, resolve within 2 sprints"
        - "P2 — medium, backlog"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - lineup-engine
        - game-mode
        - roster
        - team-management
        - batting
        - positions
        - auth
        - pwa
        - mobile-ux
        - backend
        - frontend
        - deployment
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What is missing or broken?
      description: Be specific — what test, doc, or process is absent or wrong?
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: Risk if left unresolved
      description: What breaks, what gets missed, or what slows the team down?
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: Target version to resolve
      placeholder: "e.g. v2.6.0"

  - type: textarea
    id: proposed_fix
    attributes:
      label: Proposed resolution
      description: What file, test, or process change closes this gap?
