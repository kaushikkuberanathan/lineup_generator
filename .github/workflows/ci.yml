name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Job 1: Frontend Vitest ──────────────────────────────────────────────────
  # Pure unit tests — no external dependencies, no secrets required.

  frontend:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --prefer-offline
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Run Vitest
        run: npm test
        working-directory: frontend

  # ── Job 2: Backend Integration Tests (CI_SAFE / read-only) ─────────────────
  # Runs against the PRODUCTION Render backend — no local server needed.
  # CI_SAFE=true skips all suites that write to the database:
  #   SKIPPED: auth-flow, idempotency, device-context, audit-trail, data-integrity
  #   RUNS:    regression, validation, admin, team-data (reads + wipe-guard check),
  #            feedback (auth-rejection only), contracts, rate-limits
  #
  # Required GitHub secrets:
  #   SUPABASE_URL             — Supabase project URL
  #   SUPABASE_SERVICE_ROLE_KEY — Service role key (server-side only, never expose)

  backend:
    name: Backend Integration Tests (CI_SAFE, prod read-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install --prefer-offline
        working-directory: backend

      - name: Wait for Render deployment to stabilize
        run: |
          echo "Waiting 90s for Render to finish deploying..."
          sleep 90
          echo "Checking backend health..."
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://lineup-generator-backend.onrender.com/ping)
            echo "Attempt $i: /ping returned $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 15
          done
          echo "Backend did not become ready in time"
          exit 1

      - name: Run backend test suite
        run: npm test
        working-directory: backend
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          BACKEND_URL:               https://lineup-generator-backend.onrender.com
          CI_SAFE:                   'true'
          ADMIN_KEY:                 ${{ secrets.ADMIN_KEY }}

  # ── Job 2b: Backend Unit Tests (supertest, in-process) ─────────────────────
  # Hermetic. No live server, no live DB, no Render dependency, NO REAL
  # CREDENTIALS. Env vars are dummy values that exist only to satisfy
  # require-time checks in env.js / supabase.js. If a spec reaches for the
  # network it will fail against an unresolvable .invalid host — by design.
  #
  # Collection: `node --test src/__tests__/*.test.js` — shell-expanded, does
  # NOT recurse. Specs needing a live DB live in src/__tests__/rls/ and run
  # via a separate script that this job never invokes.

  backend-unit:
    name: Backend Unit Tests (supertest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install --prefer-offline
        working-directory: backend

      - name: Run backend unit tests
        run: npm run test:unit
        working-directory: backend
        env:
          # DUMMY VALUES, NOT SECRETS — deliberate.
          #
          # These exist ONLY to satisfy require-time truthiness checks in
          # env.js / supabase.js, which throw if the vars are absent. They are
          # never dialled. The .invalid TLD (RFC 2606) cannot resolve, so if a
          # spec ever DOES attempt a live call, it fails loudly here instead of
          # silently succeeding against production.
          #
          # This job previously carried secrets.SUPABASE_SERVICE_ROLE_KEY — the
          # PROD service-role key, which bypasses RLS entirely. The job's own
          # comment asserted "tests never reach Supabase at runtime"; the env
          # block granted the capability to do exactly that. The assertion is
          # now enforced by construction rather than by convention.
          #
          # If a future test genuinely needs a live Supabase, it does NOT belong
          # in this job. See backend/src/__tests__/rls/ for the pattern: a
          # separate script, a separate credential file, and a project-ref fence.
          SUPABASE_URL:              https://ci-hermetic.invalid
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy-not-a-real-key
          SUPABASE_ANON_KEY:         ci-dummy-not-a-real-key

  # ── Job 3: Sync-script unit tests ──────────────────────────────────────────
  # Tests scripts/sync-stories-to-issues.js patch logic (Story 97 regression
  # guard, #234). Runs after frontend+backend, in parallel with smoke. Does
  # NOT block deploy — smoke's needs list excludes this job by design. Uses
  # Node's built-in test runner — zero deps, no install step needed.

  sync-script:
    name: Sync-script unit tests (node:test)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [frontend, backend, backend-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync-patch tests
        run: node --test scripts/__tests__/sync-patch.test.js

  # ── Job 4: Smoke Test (dev environment) ────────────────────────────────────
  # Runs on main only, after both frontend and backend jobs pass.
  # Requires GitHub secrets: DEV_BACKEND_URL, DEV_FRONTEND_URL
  # (SUPABASE_URL and SUPABASE_ANON_KEY already exist from the backend job)

  smoke:
    name: Smoke Test (dev)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [frontend, backend, backend-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Write .env.smoke
        run: |
          cat > .env.smoke << EOF
          DEV_BACKEND_URL=https://lineup-generator-backend.onrender.com
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          PROD_BACKEND_URL=${{ secrets.PROD_BACKEND_URL }}
          DEV_FRONTEND_URL=${{ secrets.DEV_FRONTEND_URL }}
          PROD_FRONTEND_URL=${{ secrets.PROD_FRONTEND_URL }}
          DEV_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          PROD_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          DEV_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          PROD_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          DEV_TEAM_ID=1774297491626
          PROD_TEAM_ID=
          EOF

      - name: Run smoke test (dev)
        run: npm run smoke:dev
