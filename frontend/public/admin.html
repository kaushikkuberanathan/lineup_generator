<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Lineup Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #1a1a1a;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── Loading ── */
    #loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #9ca3af;
      font-size: 14px;
    }

    /* ── Login ── */
    #login-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    #login-screen h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #1a1a1a;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 24px;
    }

    .login-box label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }

    .login-box input {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 15px;
      font-family: inherit;
      margin-bottom: 10px;
      outline: none;
    }

    .login-box input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    .field-error {
      color: #dc2626;
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 18px;
    }

    /* ── Access denied ── */
    #access-denied {
      display: none;
      text-align: center;
      padding: 80px 24px;
      color: #6b7280;
    }

    #access-denied .denied-icon { font-size: 40px; margin-bottom: 16px; }
    #access-denied h2 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }

    /* ── Admin layout ── */
    #admin-screen { display: none; }

    .tab-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 4px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; }

    .tab-content {
      display: none;
      padding: 16px;
      max-width: 640px;
      margin: 0 auto;
    }

    .tab-content.active { display: block; }

    /* ── Cards ── */
    .card {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }

    .card-name { font-weight: 600; font-size: 15px; }

    .card-meta { font-size: 13px; color: #6b7280; margin-bottom: 10px; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-admin       { background: #ede9fe; color: #6d28d9; }
    .badge-coach       { background: #dbeafe; color: #1d4ed8; }
    .badge-scorekeeper { background: #ccfbf1; color: #0f766e; }
    .badge-viewer      { background: #f3f4f6; color: #374151; }
    .badge-active      { background: #dcfce7; color: #166534; }
    .badge-invited     { background: #fef9c3; color: #854d0e; }
    .badge-suspended   { background: #fee2e2; color: #991b1b; }
    .badge-feedback    { background: #dbeafe; color: #1d4ed8; }
    .badge-bug         { background: #fee2e2; color: #991b1b; }
    .sev-blocks        { background: #fee2e2; color: #991b1b; }
    .sev-annoying      { background: #ffedd5; color: #9a3412; }
    .sev-minor         { background: #f3f4f6; color: #374151; }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      padding: 7px 14px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn-danger  { background: #dc2626; color: #fff; border-color: #dc2626; }
    .btn-ghost   { background: transparent; color: #374151; border-color: #d1d5db; }
    .btn-warn    { background: transparent; color: #dc2626; border-color: #fecaca; }
    .btn-full    { width: 100%; text-align: center; }
    .btn-sm      { padding: 5px 10px; font-size: 12px; }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    /* ── Inline action panels ── */
    .inline-action {
      display: none;
      margin-top: 10px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 6px;
      border: 1px solid #e5e5e5;
    }

    .inline-action.open { display: block; }

    .inline-action p {
      font-size: 13px;
      color: #374151;
      margin-bottom: 10px;
    }

    .inline-action select {
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      background: #fff;
    }

    /* ── Feedback filter toggles ── */
    .toggle-row { display: flex; gap: 8px; margin-bottom: 16px; }

    .toggle-btn {
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: #374151;
    }

    .toggle-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }

    /* ── Misc ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      padding: 10px 0 6px;
      cursor: pointer;
      user-select: none;
    }

    .change-types { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

    .ct-tag {
      background: #f3f4f6;
      color: #374151;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 12px;
    }

    .body-text {
      font-size: 14px;
      color: #374151;
      line-height: 1.5;
      margin-top: 8px;
      white-space: pre-wrap;
    }

    .empty-state {
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      padding: 48px 0;
    }

    /* ── Settings ── */
    .settings-section { margin-bottom: 28px; }

    .settings-section h3 {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 14px;
    }

    .settings-row:last-child { border-bottom: none; }
    .settings-label { color: #6b7280; }
    .settings-value { font-weight: 500; text-align: right; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
      animation: fadein 0.15s ease;
    }

    .toast-error { background: #dc2626; }

    @keyframes fadein {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">Loading…</div>

<!-- Login -->
<div id="login-screen">
  <h1>Lineup Generator Admin</h1>
  <div class="login-box">
    <div id="step-phone">
      <label for="inp-phone">Phone number</label>
      <input type="tel" id="inp-phone" placeholder="(555) 555-0100"
             autocomplete="tel" inputmode="tel"
             onkeydown="if(event.key==='Enter') sendOtp()">
      <div class="field-error" id="err-phone"></div>
      <button id="btn-send" class="btn btn-primary btn-full" onclick="sendOtp()">Send OTP</button>
    </div>
    <div id="step-otp" style="display:none">
      <label for="inp-otp">6-digit code</label>
      <input type="text" id="inp-otp" placeholder="123456"
             inputmode="numeric" maxlength="6" autocomplete="one-time-code"
             onkeydown="if(event.key==='Enter') verifyOtp()">
      <div class="field-error" id="err-otp"></div>
      <button id="btn-verify" class="btn btn-primary btn-full" style="margin-bottom:8px" onclick="verifyOtp()">Verify</button>
      <button class="btn btn-ghost btn-full" onclick="backToPhone()">← Back</button>
    </div>
  </div>
</div>

<!-- Access Denied -->
<div id="access-denied">
  <div class="denied-icon">🚫</div>
  <h2>Access denied</h2>
  <p>Your account doesn't have admin access.</p>
  <button class="btn btn-ghost" style="margin-top:20px" onclick="logout()">Sign out</button>
</div>

<!-- Admin UI -->
<div id="admin-screen">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-requests"  onclick="switchTab('requests')">Requests</button>
    <button class="tab-btn"        id="tab-btn-coaches"   onclick="switchTab('coaches')">Coaches</button>
    <button class="tab-btn"        id="tab-btn-feedback"  onclick="switchTab('feedback')">Feedback</button>
    <button class="tab-btn"        id="tab-btn-settings"  onclick="switchTab('settings')">Settings</button>
  </div>

  <!-- Requests -->
  <div id="tab-requests" class="tab-content active">
    <div id="requests-body"></div>
  </div>

  <!-- Coaches -->
  <div id="tab-coaches" class="tab-content">
    <div id="coaches-body"></div>
  </div>

  <!-- Feedback -->
  <div id="tab-feedback" class="tab-content">
    <div class="toggle-row">
      <button class="toggle-btn active" id="filter-all"      onclick="setFilter('',         this)">All</button>
      <button class="toggle-btn"        id="filter-feedback"  onclick="setFilter('feedback', this)">Feedback</button>
      <button class="toggle-btn"        id="filter-bug"       onclick="setFilter('bug',      this)">Bugs</button>
    </div>
    <div id="feedback-body"></div>
  </div>

  <!-- Settings -->
  <div id="tab-settings" class="tab-content">
    <div id="settings-body"></div>
  </div>
</div>

<script>
'use strict';

const BACKEND     = 'https://lineup-generator-backend.onrender.com';
const SESSION_KEY = 'lineup_admin_session';

let session     = null;
let currentUser = null;
let activeTab   = 'requests';
let fbFilter    = '';
let suspendedOpen = false;

// ── Utilities ─────────────────────────────────────────────────────────────────

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function timeAgo(ts) {
  if (!ts) return '—';
  const d = Date.now() - new Date(ts).getTime();
  const m = Math.floor(d / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + ' min ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' hr' + (h === 1 ? '' : 's') + ' ago';
  const dy = Math.floor(h / 24);
  if (dy < 30) return dy + ' day' + (dy === 1 ? '' : 's') + ' ago';
  return new Date(ts).toLocaleDateString();
}

function showToast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' toast-error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function logout() {
  localStorage.removeItem(SESSION_KEY);
  location.reload();
}

// ── API helper ────────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Authorization': 'Bearer ' + session.access_token,
      'Content-Type': 'application/json',
    },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(BACKEND + path, opts);
  let data = {};
  try { data = await res.json(); } catch (_) {}
  if (!res.ok) {
    const err = new Error(data.error || 'Request failed');
    err.status = res.status;
    err.data = data;
    throw err;
  }
  return data;
}

// ── Screen switching ──────────────────────────────────────────────────────────

function showScreen(name) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('login-screen').style.display   = name === 'login'  ? 'flex'  : 'none';
  document.getElementById('access-denied').style.display  = name === 'denied' ? 'block' : 'none';
  document.getElementById('admin-screen').style.display   = name === 'admin'  ? 'block' : 'none';
}

// ── Boot ──────────────────────────────────────────────────────────────────────

async function init() {
  const raw = localStorage.getItem(SESSION_KEY);
  if (raw) {
    try { session = JSON.parse(raw); } catch (_) { session = null; }
  }

  if (!session?.access_token) {
    showScreen('login');
    return;
  }

  try {
    const me = await api('GET', '/api/v1/auth/me');
    const isAdmin = (me.memberships || []).some(m => m.role === 'admin' && m.status === 'active');
    if (!isAdmin) { showScreen('denied'); return; }
    currentUser = me;
    showScreen('admin');
    loadTab('requests');
  } catch (err) {
    if (err.status === 401) { localStorage.removeItem(SESSION_KEY); showScreen('login'); }
    else { showScreen('denied'); }
  }
}

// ── Login ─────────────────────────────────────────────────────────────────────

let loginPhone = '';

async function sendOtp() {
  const phoneEl = document.getElementById('inp-phone');
  const errEl   = document.getElementById('err-phone');
  const btn     = document.getElementById('btn-send');
  loginPhone = phoneEl.value.trim();
  errEl.textContent = '';

  if (!loginPhone) { errEl.textContent = 'Phone number is required.'; return; }

  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    const res = await fetch(BACKEND + '/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: loginPhone }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    document.getElementById('step-phone').style.display = 'none';
    document.getElementById('step-otp').style.display   = 'block';
    document.getElementById('inp-otp').focus();
  } catch (err) {
    errEl.textContent = err.message === 'ACCESS_NOT_APPROVED'
      ? 'Your access has not been approved.'
      : 'Could not send code. Try again.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send OTP';
  }
}

async function verifyOtp() {
  const otpEl = document.getElementById('inp-otp');
  const errEl = document.getElementById('err-otp');
  const btn   = document.getElementById('btn-verify');
  const token = otpEl.value.trim();
  errEl.textContent = '';

  if (!token) { errEl.textContent = 'Enter the 6-digit code.'; return; }

  btn.disabled = true;
  btn.textContent = 'Verifying…';
  try {
    const res = await fetch(BACKEND + '/api/v1/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: loginPhone, token }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    localStorage.setItem(SESSION_KEY, JSON.stringify(data.session));
    location.reload();
  } catch (err) {
    const m = err.message;
    errEl.textContent = m === 'OTP_EXPIRED'   ? 'Code expired. Go back and resend.'
                      : m === 'INVALID_OTP'   ? 'Incorrect code. Try again.'
                      : 'Verification failed. Try again.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Verify';
  }
}

function backToPhone() {
  document.getElementById('step-otp').style.display   = 'none';
  document.getElementById('step-phone').style.display = 'block';
  document.getElementById('err-otp').textContent = '';
  document.getElementById('inp-otp').value = '';
}

// ── Tab routing ───────────────────────────────────────────────────────────────

function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-btn-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  loadTab(name);
}

function loadTab(name) {
  if (name === 'requests') loadRequests();
  else if (name === 'coaches')  loadCoaches();
  else if (name === 'feedback') loadFeedback();
  else if (name === 'settings') renderSettings();
}

// ── Requests ──────────────────────────────────────────────────────────────────

async function loadRequests() {
  const el = document.getElementById('requests-body');
  el.innerHTML = '<div class="empty-state">Loading…</div>';
  try {
    const { requests } = await api('GET', '/api/v1/admin/requests?status=pending');
    if (!requests.length) {
      el.innerHTML = '<div class="empty-state">No pending requests</div>';
      return;
    }
    el.innerHTML = requests.map(reqCard).join('');
  } catch (_) {
    el.innerHTML = '<div class="empty-state">Failed to load requests.</div>';
  }
}

function reqCard(r) {
  const id = esc(r.id);
  return `
    <div class="card" id="req-${id}">
      <div class="card-header">
        <span class="card-name">${esc(r.first_name)} ${esc(r.last_name)}</span>
        <span style="font-size:12px;color:#9ca3af">${timeAgo(r.requested_at)}</span>
      </div>
      <div class="card-meta">${esc(r.phone_e164)}</div>
      <div class="btn-row">
        <button class="btn btn-primary btn-sm" onclick="openReqAction('${id}','approve')">Approve</button>
        <button class="btn btn-ghost btn-sm"   onclick="openReqAction('${id}','reject')">Reject</button>
      </div>
      <div class="inline-action" id="req-approve-${id}">
        <p>Select a role then confirm:</p>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <select id="req-role-${id}">
            <option value="coach">Coach</option>
            <option value="scorekeeper">Scorekeeper</option>
            <option value="viewer">Viewer</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="confirmApprove('${id}')">Confirm Approve</button>
          <button class="btn btn-ghost btn-sm"   onclick="closeReqActions('${id}')">Cancel</button>
        </div>
      </div>
      <div class="inline-action" id="req-reject-${id}">
        <p>Reject this request?</p>
        <div class="btn-row">
          <button class="btn btn-danger btn-sm" onclick="confirmReject('${id}')">Yes, Reject</button>
          <button class="btn btn-ghost btn-sm"  onclick="closeReqActions('${id}')">Cancel</button>
        </div>
      </div>
    </div>`;
}

function openReqAction(id, action) {
  closeReqActions(id);
  document.getElementById('req-' + action + '-' + id).classList.add('open');
}

function closeReqActions(id) {
  const card = document.getElementById('req-' + id);
  if (card) card.querySelectorAll('.inline-action').forEach(el => el.classList.remove('open'));
}

async function confirmApprove(id) {
  const role   = document.getElementById('req-role-' + id).value;
  const teamId = currentUser.memberships?.[0]?.teamId;
  if (!teamId) { showToast('Could not determine team ID.', 'error'); return; }
  try {
    await api('POST', '/api/v1/admin/approve', { requestId: id, teamId, role });
    document.getElementById('req-' + id)?.remove();
    showToast('Approved.');
    checkEmpty('requests-body', 'No pending requests');
  } catch (err) {
    showToast(err.data?.error === 'ALREADY_PROCESSED' ? 'Already processed.' : 'Approve failed.', 'error');
  }
}

async function confirmReject(id) {
  try {
    await api('POST', '/api/v1/admin/reject', { requestId: id });
    document.getElementById('req-' + id)?.remove();
    showToast('Request rejected.');
    checkEmpty('requests-body', 'No pending requests');
  } catch (_) {
    showToast('Reject failed.', 'error');
  }
}

// ── Coaches ───────────────────────────────────────────────────────────────────

async function loadCoaches() {
  const el = document.getElementById('coaches-body');
  el.innerHTML = '<div class="empty-state">Loading…</div>';
  try {
    const { members } = await api('GET', '/api/v1/admin/members');
    renderMembers(members || []);
  } catch (_) {
    el.innerHTML = '<div class="empty-state">Failed to load members.</div>';
  }
}

function renderMembers(members) {
  const el = document.getElementById('coaches-body');
  const active    = members.filter(m => m.status !== 'suspended');
  const suspended = members.filter(m => m.status === 'suspended');

  if (!active.length && !suspended.length) {
    el.innerHTML = '<div class="empty-state">No members yet</div>';
    return;
  }

  let html = active.map(memberCard).join('');

  if (suspended.length) {
    html += `
      <div class="section-header" onclick="toggleSuspended()">
        <span id="susp-chevron">${suspendedOpen ? '▾' : '▸'}</span>
        Suspended (${suspended.length})
      </div>
      <div id="susp-list" style="display:${suspendedOpen ? 'block' : 'none'}">
        ${suspended.map(memberCard).join('')}
      </div>`;
  }

  el.innerHTML = html;
}

function memberCard(m) {
  const id   = esc(m.membershipId);
  const name = [m.firstName, m.lastName].filter(Boolean).join(' ') || '(no name)';
  const suspendBtn = m.status !== 'suspended'
    ? `<button class="btn btn-warn btn-sm" onclick="openMemAction('${id}','suspend')">Suspend</button>`
    : '';
  return `
    <div class="card" id="mem-${id}">
      <div class="card-header">
        <span class="card-name">${esc(name)}</span>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <span class="badge badge-${esc(m.role)}">${esc(m.role)}</span>
          <span class="badge badge-${esc(m.status)}">${esc(m.status)}</span>
        </div>
      </div>
      <div class="card-meta">${esc(m.phone || '—')}</div>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm" onclick="openMemAction('${id}','changerole')">Change Role</button>
        <button class="btn btn-ghost btn-sm" onclick="openMemAction('${id}','reset')">Reset Access</button>
        ${suspendBtn}
      </div>
      <div class="inline-action" id="mem-changerole-${id}">
        <p>Select new role:</p>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <select id="mem-newrole-${id}">
            <option value="admin">Admin</option>
            <option value="coach">Coach</option>
            <option value="scorekeeper">Scorekeeper</option>
            <option value="viewer">Viewer</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="confirmChangeRole('${id}')">Confirm</button>
          <button class="btn btn-ghost btn-sm"   onclick="closeMemActions('${id}')">Cancel</button>
        </div>
      </div>
      <div class="inline-action" id="mem-reset-${id}">
        <p>Reset access? Sets status to "invited" and clears the linked account.</p>
        <div class="btn-row">
          <button class="btn btn-danger btn-sm" onclick="confirmResetAccess('${id}')">Yes, Reset</button>
          <button class="btn btn-ghost btn-sm"  onclick="closeMemActions('${id}')">Cancel</button>
        </div>
      </div>
      <div class="inline-action" id="mem-suspend-${id}">
        <p>Suspend this member? They will no longer be able to log in.</p>
        <div class="btn-row">
          <button class="btn btn-danger btn-sm" onclick="confirmSuspend('${id}')">Yes, Suspend</button>
          <button class="btn btn-ghost btn-sm"  onclick="closeMemActions('${id}')">Cancel</button>
        </div>
      </div>
    </div>`;
}

function toggleSuspended() {
  suspendedOpen = !suspendedOpen;
  const list    = document.getElementById('susp-list');
  const chevron = document.getElementById('susp-chevron');
  if (list)    list.style.display    = suspendedOpen ? 'block' : 'none';
  if (chevron) chevron.textContent   = suspendedOpen ? '▾' : '▸';
}

function openMemAction(id, action) {
  closeMemActions(id);
  document.getElementById('mem-' + action + '-' + id).classList.add('open');
}

function closeMemActions(id) {
  const card = document.getElementById('mem-' + id);
  if (card) card.querySelectorAll('.inline-action').forEach(el => el.classList.remove('open'));
}

async function confirmChangeRole(id) {
  const role = document.getElementById('mem-newrole-' + id).value;
  try {
    await api('POST', '/api/v1/admin/update-role', { membershipId: id, role });
    showToast('Role updated.');
    loadCoaches();
  } catch (_) { showToast('Failed to update role.', 'error'); }
}

async function confirmResetAccess(id) {
  try {
    await api('POST', '/api/v1/admin/reset-access', { membershipId: id });
    showToast('Access reset.');
    loadCoaches();
  } catch (_) { showToast('Failed to reset access.', 'error'); }
}

async function confirmSuspend(id) {
  try {
    await api('POST', '/api/v1/admin/suspend', { membershipId: id });
    showToast('Member suspended.');
    loadCoaches();
  } catch (_) { showToast('Failed to suspend member.', 'error'); }
}

// ── Feedback ──────────────────────────────────────────────────────────────────

async function loadFeedback() {
  const el = document.getElementById('feedback-body');
  el.innerHTML = '<div class="empty-state">Loading…</div>';
  try {
    const path = '/api/v1/admin/feedback' + (fbFilter ? '?type=' + fbFilter : '');
    const { feedback } = await api('GET', path);
    if (!feedback.length) {
      el.innerHTML = '<div class="empty-state">No feedback submitted yet</div>';
      return;
    }
    el.innerHTML = feedback.map(fbCard).join('');
  } catch (_) {
    el.innerHTML = '<div class="empty-state">Failed to load feedback.</div>';
  }
}

function setFilter(type, btn) {
  fbFilter = type;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadFeedback();
}

function sevClass(sev) {
  if (!sev) return 'sev-minor';
  if (sev.startsWith('Blocks'))    return 'sev-blocks';
  if (sev.startsWith('Annoying'))  return 'sev-annoying';
  return 'sev-minor';
}

function fbCard(f) {
  const profile = f.profiles || {};
  const name  = [profile.first_name, profile.last_name].filter(Boolean).join(' ') || '(unknown)';
  const phone = profile.phone_e164 || f.phone_e164 || '—';
  const label = f.type === 'bug' ? 'Bug' : 'Feedback';

  let detail = '';
  if (f.type === 'feedback') {
    if (f.category) {
      detail += `<div style="font-size:13px;color:#6b7280;margin-top:6px">Category: <strong>${esc(f.category)}</strong></div>`;
    }
    if (Array.isArray(f.change_types) && f.change_types.length) {
      detail += `<div class="change-types">${f.change_types.map(t => `<span class="ct-tag">${esc(t)}</span>`).join('')}</div>`;
    }
  } else {
    if (f.location) {
      detail += `<div style="font-size:13px;color:#6b7280;margin-top:6px">Location: <strong>${esc(f.location)}</strong></div>`;
    }
    if (f.severity) {
      detail += `<div style="margin-top:6px"><span class="badge ${sevClass(f.severity)}">${esc(f.severity)}</span></div>`;
    }
  }

  return `
    <div class="card">
      <div class="card-header">
        <div>
          <span class="card-name">${esc(name)}</span>
          <span class="badge badge-${esc(f.type)}" style="margin-left:8px">${esc(label)}</span>
        </div>
        <span style="font-size:12px;color:#9ca3af;white-space:nowrap;margin-left:8px">${timeAgo(f.submitted_at)}</span>
      </div>
      <div class="card-meta">${esc(phone)}${f.app_version ? ' · v' + esc(f.app_version) : ''}</div>
      ${detail}
      <div class="body-text">${esc(f.body)}</div>
    </div>`;
}

// ── Settings ──────────────────────────────────────────────────────────────────

function renderSettings() {
  const m = currentUser.memberships?.[0] || {};
  document.getElementById('settings-body').innerHTML = `
    <div class="settings-section">
      <h3>Your Info</h3>
      <div class="settings-row">
        <span class="settings-label">Name</span>
        <span class="settings-value">${esc([currentUser.firstName, currentUser.lastName].filter(Boolean).join(' ') || '—')}</span>
      </div>
      <div class="settings-row">
        <span class="settings-label">Phone</span>
        <span class="settings-value">${esc(currentUser.phone || '—')}</span>
      </div>
      <div class="settings-row">
        <span class="settings-label">Role</span>
        <span class="settings-value"><span class="badge badge-${esc(m.role)}">${esc(m.role || '—')}</span></span>
      </div>
    </div>
    <div class="settings-section">
      <h3>Session</h3>
      <div class="settings-row">
        <span class="settings-label">User ID</span>
        <span class="settings-value" style="font-size:11px;font-family:monospace;word-break:break-all">${esc(currentUser.id || '—')}</span>
      </div>
      <div class="settings-row">
        <span class="settings-label">Team ID</span>
        <span class="settings-value" style="font-size:11px;font-family:monospace;word-break:break-all">${esc(m.teamId || '—')}</span>
      </div>
    </div>
    <div class="settings-section">
      <h3>Actions</h3>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="refreshMe()">Refresh Session</button>
        <button class="btn btn-warn"  onclick="logout()">Sign Out</button>
      </div>
    </div>`;
}

async function refreshMe() {
  try {
    currentUser = await api('GET', '/api/v1/auth/me');
    renderSettings();
    showToast('Session refreshed.');
  } catch (_) {
    showToast('Failed to refresh session.', 'error');
  }
}

// ── Shared helpers ────────────────────────────────────────────────────────────

function checkEmpty(containerId, msg) {
  const el = document.getElementById(containerId);
  if (el && !el.querySelector('.card')) {
    el.innerHTML = `<div class="empty-state">${msg}</div>`;
  }
}

// ── Start ─────────────────────────────────────────────────────────────────────

init();
</script>
</body>
</html>
